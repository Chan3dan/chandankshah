version: "3.9"

# ─────────────────────────────────────────────────────────
# LOCAL DEV: Just MongoDB + Mongo Express in Docker
# Run Next.js natively: npm run dev
#
# Usage: docker compose -f docker-compose.local.yml up -d
# ─────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7.0
    container_name: cks_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: cks_admin
      MONGO_INITDB_ROOT_PASSWORD: cks_secret
      MONGO_INITDB_DATABASE: cks_website
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - cks_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: cks_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: cks_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: cks_secret
      ME_CONFIG_MONGODB_URL: mongodb://cks_admin:cks_secret@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cks_net

volumes:
  mongo_data:
    name: cks_mongo_data

networks:
  cks_net:
    name: cks_network
    driver: bridge
